name: Build and Test (Apple Accelerate)

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  mac-make:
    strategy:
      fail-fast: false
      matrix:
        lapack: [0, 1]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: make accelerate USE_LAPACK=${{ matrix.lapack }}
      - run: out/run_tests_accelerate

  mac-cmake:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          mkdir out
          export INSTALL_DIR=$PWD/out
          export DYLD_FALLBACK_LIBRARY_PATH=$DYLD_FALLBACK_LIBRARY_PATH:$INSTALL_DIR/lib
          mkdir build
          cd build
          cmake -DBUILD_TESTING=ON -DUSE_APPLE_ACCELERATE=ON -DCMAKE_INSTALL_PREFIX:PATH=$INSTALL_DIR ..
          make
          make install
          ctest --output-on-failure
