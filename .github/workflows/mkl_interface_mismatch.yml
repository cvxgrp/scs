---
name: MKL Interface Mismatch

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - blas64: 0
            long: 1
          - blas64: 1
            long: 1

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Intel Apt repository
      run: |
        wget https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS-2023.PUB
        sudo apt-key add GPG-PUB-KEY-INTEL-SW-PRODUCTS-2023.PUB
        rm GPG-PUB-KEY-INTEL-SW-PRODUCTS-2023.PUB
        echo "deb https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
        sudo apt-get update

    - name: Install Intel oneAPI MKL
      run: sudo apt-get install -y intel-oneapi-mkl-devel

    - name: Setup Intel oneAPI environment
      run: |
        ONEAPI=/opt/intel/oneapi
        echo "MKLROOT=$ONEAPI/mkl/latest" >> $GITHUB_ENV
        echo "OMPROOT=$ONEAPI/compiler/latest" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=$ONEAPI/mkl/latest/lib/intel64:$ONEAPI/compiler/latest/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    - name: Checkout project code
      uses: actions/checkout@v6

    - name: Build MKL library
      run: |
        make DLONG=${{ matrix.long }} BLAS64=${{ matrix.blas64 }} mkl

    - name: Verify MKL interface mismatch fails fast
      run: |
        gcc -Iinclude test/mkl_interface_mismatch.c \
          -Lout -L"$MKLROOT/lib" -L"$MKLROOT/lib/intel64" -L"$OMPROOT/lib" \
          -Wl,-rpath,"$PWD/out" -o out/test_mkl_interface_mismatch \
          -lscsmkl -lmkl_rt
        set +e
        output=$(./out/test_mkl_interface_mismatch 2>&1)
        status=$?
        set -e
        printf '%s\n' "$output"
        if [[ $status -ne 0 ]]; then
          echo "mismatch test program failed unexpectedly with status $status"
          exit 1
        fi
        grep -q "MKL interface layer mismatch:" <<<"$output"
        grep -q "ERROR: MKL runtime initialization failed before solver setup." <<<"$output"
